<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>排球賽事控制台</title>
    <style>
        body { background: #1e1e1e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .dashboard { max-width: 900px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #00c0a8; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .team-box { background: #333; padding: 20px; border-radius: 8px; border-top: 5px solid #00c0a8; }
        .team-box.team-b { border-top-color: #ff4655; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; background: #111; border: 1px solid #555; color: white; border-radius: 4px; font-size: 16px; box-sizing: border-box;}
        
        .score-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; background: #222; padding: 10px; border-radius: 6px;}
        .score-val { font-size: 32px; font-weight: bold; width: 60px; text-align: center; color: #f8c11c;}
        button.btn-calc { background: #555; border: none; color: white; font-size: 24px; width: 40px; height: 40px; border-radius: 4px; cursor: pointer; }
        button.btn-calc:hover { background: #777; }

        .serve-radio { display: flex; align-items: center; margin-top: 15px; background: #444; padding: 10px; border-radius: 4px; cursor: pointer; }
        .serve-radio input { transform: scale(1.5); margin-right: 10px; cursor: pointer;}
        
        .big-buttons { display: flex; gap: 20px; margin-top: 30px; justify-content: center; }
        .big-btn { padding: 15px 40px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-update { background: #f8c11c; color: #000; width: 100%; margin-top: 20px;}
        .btn-update:hover { background: #ffe066; }
        .btn-show { background: #00c0a8; color: white; }
        .btn-hide { background: transparent; border: 2px solid #ff4655; color: #ff4655; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>🏐 排球賽事控制台</h1>
    
    <div class="grid">
        <div class="team-box">
            <h2>上半部隊伍 (Team A)</h2>
            <label>隊伍名稱</label>
            <input type="text" id="nameA" value="201">
            <label>Logo 圖片網址 (選填，沒有就留空)</label>
            <input type="text" id="logoA" value="">

            <label>局數 (SET)</label>
            <div class="score-row">
                <button class="btn-calc" onclick="change('setsA', -1)">-</button>
                <div class="score-val" id="setsA">1</div>
                <button class="btn-calc" onclick="change('setsA', 1)">+</button>
            </div>

            <label>比分 (POINT)</label>
            <div class="score-row">
                <button class="btn-calc" onclick="change('scoreA', -1)">-</button>
                <div class="score-val" id="scoreA">9</div>
                <button class="btn-calc" onclick="change('scoreA', 1)">+</button>
            </div>

            <label class="serve-radio">
                <input type="radio" name="serve" value="A"> 給予此隊球權 (發球)
            </label>
        </div>

        <div class="team-box team-b">
            <h2>下半部隊伍 (Team B)</h2>
            <label>隊伍名稱</label>
            <input type="text" id="nameB" value="209">

            <label>局數 (SET)</label>
            <div class="score-row">
                <button class="btn-calc" onclick="change('setsB', -1)">-</button>
                <div class="score-val" id="setsB">1</div>
                <button class="btn-calc" onclick="change('setsB', 1)">+</button>
            </div>

            <label>比分 (POINT)</label>
            <div class="score-row">
                <button class="btn-calc" onclick="change('scoreB', -1)">-</button>
                <div class="score-val" id="scoreB">13</div>
                <button class="btn-calc" onclick="change('scoreB', 1)">+</button>
            </div>

            <label class="serve-radio">
                <input type="radio" name="serve" value="B"> 給予此隊球權 (發球)
            </label>
        </div>
    </div>

    <button class="big-btn btn-update" onclick="sendData()">🔄 同步所有數據到轉播畫面</button>

    <div class="big-buttons">
        <button class="big-btn btn-show" onclick="sendCommand('show')">⬆️ 字卡進場 (Show)</button>
        <button class="big-btn btn-hide" onclick="sendCommand('hide')">⬇️ 字卡退場 (Hide)</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // ⚠️ 記得確保這裡的 IP 正確喔！
    const SERVER_IP = '192.168.68.108'; 
    const socket = io(`http://${SERVER_IP}:3000`);

    // 加減分邏輯
    function change(id, delta) {
        const el = document.getElementById(id);
        let val = parseInt(el.innerText) + delta;
        if(val < 0) val = 0;
        el.innerText = val;
        sendData(); // 加減分後自動同步，不用再手動按按鈕
    }

    // 收集資料並發送給 Server
    function sendData() {
        const data = {
            nameA: document.getElementById('nameA').value,
            logoA: document.getElementById('logoA').value,
            setsA: document.getElementById('setsA').innerText,
            scoreA: document.getElementById('scoreA').innerText,
            
            nameB: document.getElementById('nameB').value,
            setsB: document.getElementById('setsB').innerText,
            scoreB: document.getElementById('scoreB').innerText,
            
            servTeam: document.querySelector('input[name="serve"]:checked')?.value || 'none'
        };
        socket.emit('update-data', data);
    }

    // 控制進出場
    function sendCommand(cmd) {
        socket.emit('control-overlay', cmd);
    }

    // 監聽球權切換，切換時自動同步
    document.querySelectorAll('input[name="serve"]').forEach(radio => {
        radio.addEventListener('change', sendData);
    });
</script>
</body>
</html>
