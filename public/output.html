<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Volleyball Overlay Output</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Press Start 2P', cursive; }
        
        .lt-container {
            position: absolute; bottom: 0px; left: 50%;
            transform: translate(-50%, 150%);
            opacity: 0;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
            width: 1600px; height: 500px;       
            background-image: url('bg.png'); /* 你的高畫質底圖 */
            background-size: contain; background-repeat: no-repeat; background-position: center bottom;
        }

        .lt-container.show { transform: translate(-50%, 0); opacity: 1; }

        .data-text {
            position: absolute; color: white; font-size: 50px;
            transform: translate(-50%, -50%); 
            text-shadow: 4px 4px 0px #151a2d; white-space: nowrap;
        }

        /* 初始預設位置 (你微調後的完美比例) */
        .name-a { top: 44%; left: 45%; }
        .name-b { top: 66%; left: 45%; }
        
        .set-a { top: 44%; left: 58.5%; font-size: 45px; } 
        .set-b { top: 66%; left: 58.5%; font-size: 45px; }
        
        .point-a { top: 44%; left: 70%; color: #f8c11c; font-size: 68px; } 
        .point-b { top: 66%; left: 70%; color: #f8c11c; font-size: 68px; }

        .school-logo {
            position: absolute; top: 60%; left: 23%;
            transform: translate(-50%, -50%);
            width: 240px; height: 160px; object-fit: contain; image-rendering: pixelated;
        }

<body>
    <div class="lt-container" id="lt-container">
        <img id="out-logoA" class="school-logo" src="" alt="" style="display: none;">
        
        <div class="serve-icon serve-a" id="out-servA"></div>
        <div class="data-text name-a" id="out-nameA">TEAM A</div>
        <div class="data-text set-a" id="out-setsA">00</div>
        <div class="data-text point-a" id="out-scoreA">00</div>

        <div class="serve-icon serve-b" id="out-servB"></div>
        <div class="data-text name-b" id="out-nameB">TEAM B</div>
        <div class="data-text set-b" id="out-setsB">00</div>
        <div class="data-text point-b" id="out-scoreB">00</div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();

        // 接收比分與文字更新
        socket.on('data-updated', (data) => {
            const padZero = (num) => String(num).padStart(2, '0');
            document.getElementById('out-nameA').innerText = data.nameA;
            document.getElementById('out-nameB').innerText = data.nameB;
            document.getElementById('out-setsA').innerText = padZero(data.setsA);
            document.getElementById('out-setsB').innerText = padZero(data.setsB);
            document.getElementById('out-scoreA').innerText = padZero(data.scoreA);
            document.getElementById('out-scoreB').innerText = padZero(data.scoreB);
            
            const logoEl = document.getElementById('out-logoA');
            if(data.logoA && data.logoA.trim() !== "") {
                logoEl.src = data.logoA; logoEl.style.display = 'block';
            } else {
                logoEl.style.display = 'none';
            }

            document.getElementById('out-servA').classList.remove('active');
            document.getElementById('out-servB').classList.remove('active');
            if (data.servTeam === 'A') document.getElementById('out-servA').classList.add('active');
            else if (data.servTeam === 'B') document.getElementById('out-servB').classList.add('active');
        });

        // 接收導播的版面座標強制更新
        socket.on('position-updated', (pos) => {
            document.querySelector('.name-a').style.top = pos.nameA.top + '%'; document.querySelector('.name-a').style.left = pos.nameA.left + '%';
            document.querySelector('.set-a').style.top = pos.setA.top + '%'; document.querySelector('.set-a').style.left = pos.setA.left + '%';
            document.querySelector('.point-a').style.top = pos.pointA.top + '%'; document.querySelector('.point-a').style.left = pos.pointA.left + '%';
            document.querySelector('.name-b').style.top = pos.nameB.top + '%'; document.querySelector('.name-b').style.left = pos.nameB.left + '%';
            document.querySelector('.set-b').style.top = pos.setB.top + '%'; document.querySelector('.set-b').style.left = pos.setB.left + '%';
            document.querySelector('.point-b').style.top = pos.pointB.top + '%'; document.querySelector('.point-b').style.left = pos.pointB.left + '%';
        });

        // 進出場動畫
        socket.on('overlay-command', (command) => {
            const ltContainer = document.getElementById('lt-container');
            if (command === 'show') ltContainer.classList.add('show');
            else if (command === 'hide') ltContainer.classList.remove('show');
        });
    </script>
</body>
